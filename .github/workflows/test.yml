name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: swift test
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          swift --version
          xcrun --show-sdk-version

      - name: Build
        run: swift build -c release

      - name: Test
        run: swift test --parallel

  build-app:
    name: build .app bundle
    runs-on: macos-14
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build app bundle
        run: ./build-app.sh

      - name: Verify bundle
        run: |
          test -x Authenticator.app/Contents/MacOS/Authenticator
          test -f Authenticator.app/Contents/Info.plist
          codesign -dv Authenticator.app
